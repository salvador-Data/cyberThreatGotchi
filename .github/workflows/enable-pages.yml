name: Enable GitHub Pages (one-time)

# Optional: verify Pages or enable gh-pages branch deploy.
# Pages was enabled via `gh` / Settings — this workflow should pass with "already live".

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: read

concurrency:
  group: enable-pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check public site
        id: site
        run: |
          URL="https://salvador-Data.github.io/cyberThreatGotchi/"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "HTTP $CODE for $URL"
          if [ "$CODE" = "200" ]; then
            echo "✅ Site is live."
          else
            echo "⚠️ Site returned $CODE — enable manually: Settings → Pages → gh-pages / (root)"
          fi

      - name: Check Pages API (informational)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              const res = await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.info("Pages configured: " + (res.data.html_url || ""));
              core.info("Source: " + JSON.stringify(res.data.source || {}));
            } catch (err) {
              core.warning(
                "Could not read Pages config via GITHUB_TOKEN (normal if token lacks admin). " +
                  "Use Settings → Pages → branch gh-pages / (root), or run: python scripts/enable_github_pages.py"
              );
            }

      - name: Result
        if: steps.site.outputs.code == '200'
        run: echo "GitHub Pages is working — no action needed."

      - name: Manual enable required
        if: steps.site.outputs.code != '200'
        run: |
          echo "::error::Pages not live. Open https://github.com/salvador-Data/cyberThreatGotchi/settings/pages"
          echo "Set Source: Deploy from a branch → gh-pages → / (root)"
          exit 1
