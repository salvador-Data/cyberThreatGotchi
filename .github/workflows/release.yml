name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      - name: Generate assets
        run: |
          python assets/sprites/generate_sprites.py
          python assets/marketing/generate_graphics.py
          python hardware/generate_stl.py --variant all --python-only

      - name: Run tests
        env:
          CTG_SIMULATION: "1"
        run: pytest tests/ -q

      - name: Package release zips
        run: python scripts/package_release.py

      - name: Verify release artifacts
        run: |
          test -f dist/marketing-graphics.zip
          test -f dist/sprites.zip
          test -f dist/enclosure-stl-eink.zip
          test -f dist/enclosure-stl-lcd.zip
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/marketing-graphics.zip
            dist/sprites.zip
            dist/enclosure-stl-eink.zip
            dist/enclosure-stl-lcd.zip
            docs/images/hero.png
            docs/images/og-ecosystem.png
            docs/images/og-cyberthreatgotchi.png
