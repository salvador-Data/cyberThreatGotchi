name: Deploy website (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/web/**"
      - "scripts/sync_website_to_docs.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync website to docs/web
        run: python scripts/sync_website_to_docs.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
          publish_branch: gh-pages
          commit_message: "Deploy Hacker Planet LLC website"
