name: Deploy website (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/web/**"
      - "scripts/sync_website_to_docs.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Enable GitHub Pages (workflow build)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data } = await github.rest.repos.getPages({ owner, repo });
              if (data.build_type !== "workflow") {
                await github.rest.repos.updatePages({
                  owner,
                  repo,
                  build_type: "workflow",
                });
                console.log("Updated Pages build_type to workflow");
              } else {
                console.log("Pages already uses workflow build");
              }
            } catch (error) {
              if (error.status === 404) {
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  build_type: "workflow",
                });
                console.log("Created GitHub Pages site (workflow build)");
              } else {
                throw error;
              }
            }

  deploy:
    needs: bootstrap
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync website to docs/web
        run: python scripts/sync_website_to_docs.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
