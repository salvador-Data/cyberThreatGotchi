; CyberThreatGotchi remote status — M5Stack Cardputer (PlatformIO / Arduino)
; Polls CTG /api/status over Wi-Fi and renders mood + last threat on LCD.

[env:m5stack-cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified@^0.1.16
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    -DCTG_HOST=\"192.168.1.50\"
    -DCTG_PORT=8765
    -DPOLL_MS=4000
