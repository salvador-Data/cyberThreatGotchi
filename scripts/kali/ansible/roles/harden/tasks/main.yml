---
- name: Install hardening packages
  ansible.builtin.apt:
    name:
      - fail2ban
      - unattended-upgrades
      - lynis
      - ufw
    state: present
    update_cache: true

- name: Enable fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
