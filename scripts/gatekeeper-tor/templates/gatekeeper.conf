# Gatekeeper.TOR — client-only Tor hardening (Hacker Planet LLC lab template)
# Install: install-gatekeeper-kali.sh → /etc/tor/torrc.d/gatekeeper.conf
# Authorized defensive lab use only — not for illegal evasion or third-party abuse.
#
# References:
#   https://2019.www.torproject.org/docs/tor-manual.html.en
#   https://community.torproject.org/relay/setup/post-install/

SafeLogging 1
AvoidDiskWrites 1

SocksPort 127.0.0.1:9050
ControlPort 127.0.0.1:9051

# Cookie auth — run on target host: tor --hash-password (store hash locally, never in git)
# CookieAuthentication 1

ExitPolicy reject *:*

# Optional censored-network bridges (manual — not auto-enabled):
# UseBridges 1
# ClientTransportPlugin obfs4 exec /usr/bin/obfs4proxy
